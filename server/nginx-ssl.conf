# Nginx SSL配置文件 - anjia.work
# 使用证书: anjia.work.pem / anjia.work.key

server {
    listen 80;
    server_name anjia.work www.anjia.work;

    # 强制重定向到HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name anjia.work www.anjia.work;

    # SSL证书配置
    ssl_certificate /workspace/projects/server/ssl/anjia.work.pem;
    ssl_certificate_key /workspace/projects/server/ssl/anjia.work.key;

    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头部
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 日志
    access_log /var/log/nginx/anjia.access.log;
    error_log /var/log/nginx/anjia.error.log;

    # 前端静态资源（如果需要单独部署Web版本）
    location / {
        # 如果前端有独立的web-build，取消下面的注释
        # root /workspace/projects/client/web-build;
        # try_files $uri $uri/ /index.html;

        # 暂时返回404，或者可以代理到其他地方
        return 404 "Please use mobile app or contact admin";
    }

    # 后端API代理
    location /api/ {
        proxy_pass http://localhost:9091;
        proxy_http_version 1.1;

        # WebSocket支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 标准代理头部
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # SSE支持（流式响应）
        proxy_buffering off;
        proxy_cache off;
    }

    # 健康检查
    location /health {
        proxy_pass http://localhost:9091/api/v1/health;
        proxy_set_header Host $host;
        access_log off;
    }
}
