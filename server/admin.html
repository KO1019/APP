<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI情绪日记 - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100%;
            background: #2c3e50;
            color: white;
            padding: 20px 0;
        }

        .logo {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            background: #34495e;
        }

        .main-content {
            margin-left: 250px;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        .content-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .content-section h2 {
            margin-bottom: 20px;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }
            .main-content {
                margin-left: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">📝 AI情绪日记</div>
        <div class="nav-item active" data-section="dashboard">📊 数据概览</div>
        <div class="nav-item" data-section="users">👥 用户管理</div>
        <div class="nav-item" data-section="diaries">📖 日记管理</div>
        <div class="nav-item" data-section="conversations">💬 对话记录</div>
        <div class="nav-item" data-section="settings">⚙️ 系统设置</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>管理后台</h1>
            <button class="btn btn-primary" onclick="refreshData()">🔄 刷新数据</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>总用户数</h3>
                <div class="value" id="total-users">-</div>
            </div>
            <div class="stat-card">
                <h3>总日记数</h3>
                <div class="value" id="total-diaries">-</div>
            </div>
            <div class="stat-card">
                <h3>总对话数</h3>
                <div class="value" id="total-conversations">-</div>
            </div>
            <div class="stat-card">
                <h3>活跃用户</h3>
                <div class="value" id="active-users">-</div>
            </div>
        </div>

        <div id="dashboard" class="content-section active">
            <h2>数据概览</h2>
            <div id="dashboard-content">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div id="users" class="content-section">
            <h2>用户管理</h2>
            <div id="users-content">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div id="diaries" class="content-section">
            <h2>日记管理</h2>
            <div id="diaries-content">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div id="conversations" class="content-section">
            <h2>对话记录</h2>
            <div id="conversations-content">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div id="settings" class="content-section">
            <h2>系统设置</h2>
            <div id="settings-content">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // 页面导航
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
                this.classList.add('active');
                const sectionId = this.getAttribute('data-section');
                document.getElementById(sectionId).classList.add('active');
                loadSectionData(sectionId);
            });
        });

        // API基础URL
        const API_BASE = '/api/v1';

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/admin/stats`);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('total-users').textContent = data.total_users || 0;
                    document.getElementById('total-diaries').textContent = data.total_diaries || 0;
                    document.getElementById('total-conversations').textContent = data.total_conversations || 0;
                    document.getElementById('active-users').textContent = data.active_users || 0;
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }

        // 加载各部分数据
        async function loadSectionData(section) {
            const contentDiv = document.getElementById(`${section}-content`);

            try {
                const response = await fetch(`${API_BASE}/admin/${section}`);
                if (!response.ok) {
                    throw new Error('加载数据失败');
                }

                const data = await response.json();

                if (data.data && data.data.length > 0) {
                    contentDiv.innerHTML = renderTable(section, data.data);
                } else {
                    contentDiv.innerHTML = '<div class="empty">暂无数据</div>';
                }
            } catch (error) {
                console.error(`加载${section}数据失败:`, error);
                contentDiv.innerHTML = '<div class="empty">加载失败</div>';
            }
        }

        // 渲染表格
        function renderTable(section, data) {
            const keys = Object.keys(data[0]);

            let html = '<table><thead><tr>';
            keys.forEach(key => {
                html += `<th>${formatKey(key)}</th>`;
            });
            html += '</tr></thead><tbody>';

            data.forEach(row => {
                html += '<tr>';
                keys.forEach(key => {
                    html += `<td>${formatValue(row[key])}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            return html;
        }

        // 格式化键名
        function formatKey(key) {
            return key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        // 格式化值
        function formatValue(value) {
            if (value === null || value === undefined) return '-';
            if (typeof value === 'object') return JSON.stringify(value);
            if (typeof value === 'boolean') return value ? '是' : '否';
            if (value.length > 100) return value.substring(0, 100) + '...';
            return value;
        }

        // 刷新数据
        function refreshData() {
            loadStats();
            const activeSection = document.querySelector('.content-section.active').id;
            loadSectionData(activeSection);
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadSectionData('dashboard');
        });
    </script>
</body>
</html>
