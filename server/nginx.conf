# Nginx配置 - AI情绪日记
# 包含后端API、下载页面和管理页面的配置

# HTTP服务器（重定向到HTTPS）
server {
    listen 80;
    server_name localhost;

    # 下载页面（HTTP访问）
    location /download.html {
        alias /workspace/projects/server/download.html;
        try_files $uri =404;
    }

    # 管理页面（HTTP访问）
    location /admin.html {
        alias /workspace/projects/server/admin.html;
        try_files $uri =404;
    }

    # 其他HTTP请求重定向到HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS服务器
server {
    listen 443 ssl http2;
    server_name localhost;

    # SSL证书配置
    ssl_certificate /workspace/projects/server/ssl/cert.pem;
    ssl_certificate_key /workspace/projects/server/ssl/key.pem;

    # SSL优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 日志配置
    access_log /var/log/nginx/ai-diary-access.log;
    error_log /var/log/nginx/ai-diary-error.log;

    # 客户端最大请求体大小
    client_max_body_size 50M;

    # 后端API代理
    location /api/ {
        proxy_pass http://localhost:9091/api/;
        proxy_http_version 1.1;

        # 代理头配置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # SSE支持（流式响应）
        proxy_buffering off;
        proxy_cache off;
    }

    # 后端健康检查
    location /health {
        proxy_pass http://localhost:9091/health;
        proxy_http_version 1.1;
        access_log off;
    }

    # 下载页面
    location /download.html {
        alias /workspace/projects/server/download.html;
        try_files $uri =404;
    }

    # 管理页面
    location /admin.html {
        alias /workspace/projects/server/admin.html;
        try_files $uri =404;
    }

    # 静态资源（如果需要）
    location /static/ {
        alias /workspace/projects/server/static/;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
}
