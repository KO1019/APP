<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI情绪日记 - 用AI陪伴你的情绪成长之路">
    <title>AI情绪日记 - 官方下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 60px 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            font-size: 72px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .app-name {
            font-size: 36px;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
        }

        .slogan {
            font-size: 16px;
            color: #999;
            font-weight: 400;
        }

        .version-tag {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            margin-top: 16px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .download-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 40px;
        }

        .download-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .download-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }

        .download-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .download-card.disabled:hover {
            transform: none;
            box-shadow: none;
            border-color: transparent;
        }

        .platform-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .platform-name {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .platform-desc {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .download-btn.disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }

        .not-available {
            color: #999;
            font-size: 14px;
            font-weight: 500;
        }

        .info-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 24px;
        }

        .info-title {
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-content {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 15px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid #e5e5e5;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 12px;
        }

        .footer-links a {
            color: #999;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #667eea;
        }

        .footer-text {
            font-size: 12px;
            color: #ccc;
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .container {
                padding: 40px 24px;
            }

            .logo {
                font-size: 60px;
            }

            .app-name {
                font-size: 28px;
            }

            .download-section {
                grid-template-columns: 1fr;
            }

            .footer-links {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo区域 -->
        <div class="header">
            <div class="logo">📝</div>
            <h1 class="app-name">AI情绪日记</h1>
            <p class="slogan">用AI陪伴你的情绪成长之路</p>
            <div id="version-tag" class="version-tag" style="display: none;">v1.0.0</div>
        </div>

        <!-- 下载区域 -->
        <div class="download-section" id="download-section">
            <!-- 加载状态 -->
            <div id="loading" class="loading" style="grid-column: 1 / -1;">
                <div class="loading-spinner"></div>
                加载中...
            </div>

            <!-- Android下载卡片 -->
            <div class="download-card" id="android-card" style="display: none;">
                <div class="platform-icon">🤖</div>
                <div class="platform-name">Android</div>
                <div class="platform-desc" id="android-desc">适用于Android 8.0及以上系统</div>
                <a href="#" class="download-btn" id="android-btn">立即下载</a>
                <div class="not-available" id="android-not-available" style="display: none;">暂未开放</div>
            </div>

            <!-- iOS下载卡片 -->
            <div class="download-card" id="ios-card" style="display: none;">
                <div class="platform-icon">🍎</div>
                <div class="platform-name">iOS</div>
                <div class="platform-desc" id="ios-desc">适用于iOS 14.0及以上系统</div>
                <a href="#" class="download-btn" id="ios-btn">前往下载</a>
                <div class="not-available" id="ios-not-available" style="display: none;">暂未开放</div>
            </div>
        </div>

        <!-- 更新内容 -->
        <div class="info-section" id="info-section" style="display: none;">
            <div class="info-title">
                📢 更新内容
            </div>
            <div class="info-content" id="update-content">
                AI情绪日记全新上线！
            </div>
        </div>

        <!-- 底部 -->
        <div class="footer">
            <div class="footer-links">
                <a href="#">用户协议</a>
                <a href="#">隐私政策</a>
                <a href="#">联系我们</a>
                <a href="#">帮助中心</a>
            </div>
            <p class="footer-text">© 2026 AI情绪日记. All rights reserved.</p>
        </div>
    </div>

    <script>
        // 获取下载信息
        async function fetchDownloadInfo() {
            try {
                const response = await fetch('/api/v1/app/download');

                if (!response.ok) {
                    throw new Error('获取下载信息失败');
                }

                const data = await response.json();

                // 隐藏加载状态
                document.getElementById('loading').style.display = 'none';

                // 显示下载卡片
                const androidCard = document.getElementById('android-card');
                const iosCard = document.getElementById('ios-card');

                androidCard.style.display = 'block';
                iosCard.style.display = 'block';

                // 显示版本标签
                const versionTag = document.getElementById('version-tag');
                const version = data.android?.version || '1.0.0';
                versionTag.textContent = `v${version}`;
                versionTag.style.display = 'inline-block';

                // 显示更新内容
                const infoSection = document.getElementById('info-section');
                const updateContent = document.getElementById('update-content');
                const releaseNotes = data.android?.release_notes || 'AI情绪日记全新上线！';

                updateContent.textContent = releaseNotes;
                infoSection.style.display = 'block';

                // Android下载卡片
                const androidBtn = document.getElementById('android-btn');
                const androidNotAvailable = document.getElementById('android-not-available');
                const androidDesc = document.getElementById('android-desc');

                if (data.android && data.android.url) {
                    androidBtn.href = data.android.url;
                    androidBtn.classList.remove('disabled');
                    androidBtn.style.display = 'inline-block';
                    androidNotAvailable.style.display = 'none';
                    androidDesc.textContent = `适用于Android 8.0及以上系统 ${data.android.size || ''}`;
                    androidCard.classList.remove('disabled');
                } else {
                    androidBtn.style.display = 'none';
                    androidNotAvailable.style.display = 'block';
                    androidCard.classList.add('disabled');
                }

                // iOS下载卡片
                const iosBtn = document.getElementById('ios-btn');
                const iosNotAvailable = document.getElementById('ios-not-available');
                const iosDesc = document.getElementById('ios-desc');

                if (data.ios && data.ios.url) {
                    iosBtn.href = data.ios.url;
                    iosBtn.classList.remove('disabled');
                    iosBtn.style.display = 'inline-block';
                    iosNotAvailable.style.display = 'none';
                    iosDesc.textContent = `适用于iOS 14.0及以上系统 ${data.ios.size || ''}`;
                    iosCard.classList.remove('disabled');
                } else {
                    iosBtn.style.display = 'none';
                    iosNotAvailable.style.display = 'block';
                    iosCard.classList.add('disabled');
                }

                console.log('下载信息加载成功:', data);

            } catch (error) {
                console.error('加载下载信息失败:', error);

                // 隐藏加载状态
                document.getElementById('loading').style.display = 'none';

                // 显示暂未开放状态
                const androidCard = document.getElementById('android-card');
                const iosCard = document.getElementById('ios-card');

                androidCard.style.display = 'block';
                iosCard.style.display = 'block';

                document.getElementById('android-btn').style.display = 'none';
                document.getElementById('android-not-available').style.display = 'block';
                androidCard.classList.add('disabled');

                document.getElementById('ios-btn').style.display = 'none';
                document.getElementById('ios-not-available').style.display = 'block';
                iosCard.classList.add('disabled');
            }
        }

        // 页面加载时立即执行
        document.addEventListener('DOMContentLoaded', function() {
            fetchDownloadInfo();
        });
    </script>
</body>
</html>
