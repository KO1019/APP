<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI情绪日记 - 用AI陪伴你的情绪成长之路">
    <title>AI情绪日记 - 官方下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
            flex: 1;
        }

        /* Logo区域 */
        .logo-section {
            text-align: center;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .app-name {
            font-size: 48px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .slogan {
            font-size: 18px;
            color: #999;
        }

        /* 版本信息 */
        .version-info {
            text-align: center;
            margin-bottom: 60px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .version-number {
            font-size: 24px;
            font-weight: 600;
            color: #ff6b35;
            margin-bottom: 8px;
        }

        .update-time {
            font-size: 14px;
            color: #999;
        }

        .update-content {
            font-size: 15px;
            color: #666;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e5e5e5;
            line-height: 1.8;
        }

        /* 下载区域 */
        .download-section {
            margin-bottom: 60px;
        }

        .download-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 24px;
            text-align: center;
        }

        .download-list {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .download-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .download-item:last-child {
            border-bottom: none;
        }

        .download-item:hover {
            background: #fafafa;
        }

        .platform-info {
            flex: 1;
        }

        .platform-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .platform-desc {
            font-size: 14px;
            color: #999;
        }

        .download-btn {
            padding: 12px 32px;
            background: #ff6b35;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            white-space: nowrap;
        }

        .download-btn:hover:not(:disabled) {
            background: #ea580c;
        }

        .download-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .not-available {
            color: #999;
            font-size: 14px;
            padding: 12px 32px;
        }

        /* 底部链接 */
        .footer {
            background: white;
            padding: 24px;
            text-align: center;
            border-top: 1px solid #e5e5e5;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 12px;
        }

        .footer-links a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #ff6b35;
        }

        .footer-text {
            font-size: 12px;
            color: #999;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 15px;
        }

        .loading::after {
            content: "...";
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: "."; }
            40% { content: ".."; }
            60%, 100% { content: "..."; }
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .container {
                padding: 40px 16px;
            }

            .logo {
                font-size: 60px;
            }

            .app-name {
                font-size: 32px;
            }

            .slogan {
                font-size: 16px;
            }

            .download-item {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .download-btn {
                width: 100%;
            }

            .footer-links {
                flex-direction: column;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo区域 -->
        <div class="logo-section">
            <div class="logo">📝</div>
            <h1 class="app-name">AI情绪日记</h1>
            <p class="slogan">用AI陪伴你的情绪成长之路</p>
        </div>

        <!-- 加载状态 -->
        <div id="loading" class="loading">加载中</div>

        <!-- 版本信息 -->
        <div id="version-section" class="version-info" style="display: none;">
            <div class="version-number" id="version-number">v1.0.0</div>
            <div class="update-time" id="update-time">2026-01-01</div>
            <div class="update-content" id="update-content">
                AI情绪日记全新上线！
            </div>
        </div>

        <!-- 下载区域 -->
        <div id="download-section" class="download-section" style="display: none;">
            <h2 class="download-title">选择你的平台</h2>
            <div class="download-list" id="download-list">
                <!-- 下载列表将由JavaScript生成 -->
            </div>
        </div>
    </div>

    <!-- 底部 -->
    <footer class="footer">
        <div class="footer-links">
            <a href="#">用户协议</a>
            <a href="#">隐私政策</a>
            <a href="#">联系我们</a>
            <a href="#">帮助中心</a>
        </div>
        <p class="footer-text">© 2026 AI情绪日记. All rights reserved.</p>
    </footer>

    <script>
        // 获取下载信息
        async function fetchDownloadInfo() {
            try {
                const response = await fetch('/api/v1/app/download');

                if (!response.ok) {
                    throw new Error('获取下载信息失败');
                }

                const data = await response.json();

                // 隐藏加载状态
                document.getElementById('loading').style.display = 'none';

                // 显示版本信息
                const versionSection = document.getElementById('version-section');
                versionSection.style.display = 'block';

                // 更新版本信息
                const androidVersion = data.android?.version || '1.0.0';
                const updateTime = new Date().toISOString().split('T')[0];
                const updateNotes = data.android?.release_notes || 'AI情绪日记全新上线！';

                document.getElementById('version-number').textContent = `v${androidVersion}`;
                document.getElementById('update-time').textContent = updateTime;
                document.getElementById('update-content').textContent = updateNotes;

                // 生成下载列表
                const downloadList = document.getElementById('download-list');
                const downloadSection = document.getElementById('download-section');

                // Android下载项
                const androidItem = document.createElement('div');
                androidItem.className = 'download-item';
                if (data.android && data.android.url) {
                    androidItem.innerHTML = `
                        <div class="platform-info">
                            <div class="platform-name">Android</div>
                            <div class="platform-desc">适用于Android 8.0及以上系统 ${data.android.size || ''}</div>
                        </div>
                        <a href="${data.android.url}" class="download-btn" download>立即下载</a>
                    `;
                } else {
                    androidItem.innerHTML = `
                        <div class="platform-info">
                            <div class="platform-name">Android</div>
                            <div class="platform-desc">适用于Android 8.0及以上系统</div>
                        </div>
                        <span class="not-available">暂未开放</span>
                    `;
                }
                downloadList.appendChild(androidItem);

                // iOS下载项
                const iosItem = document.createElement('div');
                iosItem.className = 'download-item';
                if (data.ios && data.ios.url) {
                    iosItem.innerHTML = `
                        <div class="platform-info">
                            <div class="platform-name">iOS</div>
                            <div class="platform-desc">适用于iOS 14.0及以上系统 ${data.ios.size || ''}</div>
                        </div>
                        <a href="${data.ios.url}" class="download-btn" target="_blank">前往下载</a>
                    `;
                } else {
                    iosItem.innerHTML = `
                        <div class="platform-info">
                            <div class="platform-name">iOS</div>
                            <div class="platform-desc">适用于iOS 14.0及以上系统</div>
                        </div>
                        <span class="not-available">暂未开放</span>
                    `;
                }
                downloadList.appendChild(iosItem);

                // 显示下载区域
                downloadSection.style.display = 'block';

                console.log('下载信息加载成功:', data);

            } catch (error) {
                console.error('加载下载信息失败:', error);

                // 隐藏加载状态
                document.getElementById('loading').style.display = 'none';

                // 显示版本信息（默认值）
                const versionSection = document.getElementById('version-section');
                versionSection.style.display = 'block';
                document.getElementById('version-number').textContent = 'v1.0.0';
                document.getElementById('update-time').textContent = new Date().toISOString().split('T')[0];
                document.getElementById('update-content').textContent = 'AI情绪日记全新上线！';

                // 显示暂未开放
                const downloadList = document.getElementById('download-list');
                const downloadSection = document.getElementById('download-section');

                const androidItem = document.createElement('div');
                androidItem.className = 'download-item';
                androidItem.innerHTML = `
                    <div class="platform-info">
                        <div class="platform-name">Android</div>
                        <div class="platform-desc">适用于Android 8.0及以上系统</div>
                    </div>
                    <span class="not-available">暂未开放</span>
                `;
                downloadList.appendChild(androidItem);

                const iosItem = document.createElement('div');
                iosItem.className = 'download-item';
                iosItem.innerHTML = `
                    <div class="platform-info">
                        <div class="platform-name">iOS</div>
                        <div class="platform-desc">适用于iOS 14.0及以上系统</div>
                    </div>
                    <span class="not-available">暂未开放</span>
                `;
                downloadList.appendChild(iosItem);

                downloadSection.style.display = 'block';
            }
        }

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', function() {
            fetchDownloadInfo();
        });
    </script>
</body>
</html>
